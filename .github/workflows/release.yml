name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: weathr
            asset_name: weathr-linux-amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: weathr
            asset_name: weathr-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: weathr
            asset_name: weathr-macos-amd64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: weathr
            asset_name: weathr-macos-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: weathr.exe
            asset_name: weathr-windows-amd64.exe
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: weathr.exe
            asset_name: weathr-windows-arm64.exe
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            artifact_name: weathr
            asset_name: weathr-freebsd-amd64
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: weathr
            asset_name: weathr-linux-musl-amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: weathr
            asset_name: weathr-linux-musl-arm64
            use_cross: true

    steps:
      - uses: actions/checkout@v6
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (with cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (with cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: ABI Check (glibc floor)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          max_glibc="$(readelf --version-info target/${{ matrix.target }}/release/${{ matrix.artifact_name }} | grep -o 'GLIBC_[0-9.]*' | sort -V | tail -1)"
          echo "max required glibc: $max_glibc"
          [ "$(printf '%s\n' "$max_glibc" "GLIBC_2.17" | sort -V | tail -1)" = "GLIBC_2.17" ]

      - name: Prepare Asset
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          cp ${{ matrix.artifact_name }} ../../../${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: packages-x86_64-unknown-linux-gnu

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Linux packaging toolchains
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Install nfpm
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build package inputs
        shell: bash
        run: |
          cargo build --locked --release --target x86_64-unknown-linux-gnu --bin weathr
          cargo build --locked --release --target x86_64-unknown-linux-musl --bin weathr
          cargo build --locked --release --bin generate-manpage

      - name: Build .deb and .rpm
        shell: bash
        run: |
          ./scripts/package-linux.sh \
            "${GITHUB_REF_NAME#v}" \
            amd64 \
            target/x86_64-unknown-linux-gnu/release/weathr \
            dist/packages \
            deb,rpm

      - name: Build .apk
        shell: bash
        run: |
          ./scripts/package-linux.sh \
            "${GITHUB_REF_NAME#v}" \
            x86_64 \
            target/x86_64-unknown-linux-musl/release/weathr \
            dist/packages \
            apk

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/packages/*.apk

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
