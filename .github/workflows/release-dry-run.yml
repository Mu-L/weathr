name: Release Dry Run

on:
  workflow_dispatch:

jobs:
  build-dry-run:
    name: Build Dry Run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: weathr
            asset_name: weathr-linux-amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: weathr
            asset_name: weathr-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: weathr
            asset_name: weathr-macos-amd64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: weathr
            asset_name: weathr-macos-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: weathr.exe
            asset_name: weathr-windows-amd64.exe
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: weathr.exe
            asset_name: weathr-windows-arm64.exe
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            artifact_name: weathr
            asset_name: weathr-freebsd-amd64
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: weathr
            asset_name: weathr-linux-musl-amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: weathr
            asset_name: weathr-linux-musl-arm64
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (with cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (with cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: ABI Check (glibc floor)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          max_glibc="$(readelf --version-info target/${{ matrix.target }}/release/${{ matrix.artifact_name }} | grep -o 'GLIBC_[0-9.]*' | sort -V | tail -1)"
          echo "max required glibc: $max_glibc"
          [ "$(printf '%s\n' "$max_glibc" "GLIBC_2.17" | sort -V | tail -1)" = "GLIBC_2.17" ]

  package-linux-dry-run:
    name: Package Linux Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: packages-dry-run-x86_64-unknown-linux-gnu

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Linux packaging toolchains
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Install nfpm
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build package inputs
        shell: bash
        run: |
          cargo build --locked --release --target x86_64-unknown-linux-gnu --bin weathr
          cargo build --locked --release --target x86_64-unknown-linux-musl --bin weathr
          cargo build --locked --release --bin generate-manpage

      - name: Build .deb, .rpm, and .apk
        shell: bash
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | python -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          ./scripts/package-linux.sh \
            "$VERSION" \
            amd64 \
            target/x86_64-unknown-linux-gnu/release/weathr \
            dist/packages \
            deb,rpm
          ./scripts/package-linux.sh \
            "$VERSION" \
            x86_64 \
            target/x86_64-unknown-linux-musl/release/weathr \
            dist/packages \
            apk

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-dry-run
          path: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/packages/*.apk
